services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: notesound
      POSTGRES_USER: notesound
      POSTGRES_PASSWORD: notesound
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesound -d notesound"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    environment:
      VIRTUAL_HOST: notesound.codewizard.dk
      VIRTUAL_PORT: 80
      CLIENT_MAX_BODY_SIZE: 25m
      NOTESOUND_DATABASE_URL: postgresql+psycopg://notesound:notesound@db:5432/notesound
      NOTESOUND_ARTIFACTS_DIR: /app/data/artifacts
      NOTESOUND_MAX_UPLOAD_SIZE_BYTES: 26214400
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/docker/start-api.sh"]
    volumes:
      - ./data:/app/data
    # If your nginx-proxy runs on a shared external Docker network, attach this
    # service to that network as well and replace the network name if needed.
    # networks:
    #   - default
    #   - nginx-proxy

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: test
    environment:
      NOTESOUND_DATABASE_URL: sqlite:////tmp/notesound-test.db
      NOTESOUND_ARTIFACTS_DIR: /tmp/artifacts
    command: ["pytest", "-q"]

volumes:
  postgres_data:

